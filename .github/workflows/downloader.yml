name: Batch Data Scraper

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Clean URL List
        run: |
          mkdir -p scraped_data
          # Fetch from Wayback CDX
          curl -s "http://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=original" | sort -u > raw.txt
          
          # Clean double slashes and remove images
          grep "^http" raw.txt | sed 's|com//|com/|g' | grep -Ev "\.(jpg|jpeg|png|gif|svg|ico|webp)$" > filtered_urls.txt

      - name: Wayback Batch Download
        run: |
          # Take 50 files
          head -n 50 filtered_urls.txt > batch.txt
          
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            
            # This is the magic part: it tells Wayback to serve the file directly
            WAYBACK_URL="https://web.archive.org/web/20260101000000if_/$url"
            
            echo "Downloading from Archive: $url"
            
            # We don't need complex headers for Archive.org
            wget -q -nc --timeout=20 --tries=3 "$WAYBACK_URL" -O "./scraped_data/$(basename "$url")" || echo "Failed Archive Download: $url"
            
            # Archive.org is nicer, but still give it a 2s rest
            sleep 2
          done < batch.txt

      - name: Save Data to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped_data/
          if git diff --staged --quiet; then
            echo "No new files."
          else
            git commit -m "Data grabbed from Wayback Archive"
            git push
          fi
