name: Batch Data Scraper

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Filter URLs
        run: |
          mkdir -p scraped_data
          echo "Fetching from Wayback..."
          # Fetch URLs, filter for actual http links, remove images
          curl -s "http://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=original" | sort -u > raw.txt
          grep "^http" raw.txt | grep -Ev "\.(jpg|jpeg|png|gif|svg|ico|webp)$" > filtered_urls.txt
          echo "Found $(wc -l < filtered_urls.txt) files to download."

      - name: Batch Download
        run: |
          # Only process the first 50 to prevent GitHub from killing the job
          head -n 50 filtered_urls.txt > batch.txt
          
          while IFS= read -r url; do
            echo "Processing: $url"
            # We use -L to follow redirects and -U to look like a browser
            wget -q -nc -L -U "Mozilla/5.0" "$url" -P ./scraped_data/ || echo "Skipping failed download"
            sleep 2
          done < batch.txt

      - name: Upload to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped_data/
          # Only commit if there are actually new files
          if git diff --staged --quiet; then
            echo "No new data found."
          else
            git commit -m "Add scraped batch data"
            git push
          fi
