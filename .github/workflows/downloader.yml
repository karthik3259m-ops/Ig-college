name: Batch Data Scraper

on:
  workflow_dispatch: # Allows you to start it manually

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to upload files to your repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate URL List and Download
        run: |
          mkdir -p scraped_data
          
          echo "Step 1: Fetching all URLs from Wayback Machine..."
          curl -s "http://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=original" | sort -u > raw_urls.txt
          
          echo "Step 2: Filtering out images..."
          # Excludes jpg, png, gif, svg, ico, webp
          grep -Ev "\.(jpg|jpeg|png|gif|svg|ico|webp)$" raw_urls.txt > filtered_urls.txt
          
          echo "Step 3: Starting Batch Download..."
          while IFS= read -r url; do
            # Skip empty lines
            [ -z "$url" ] && continue
            
            echo "Fetching: $url"
            
            # Using wget with a real Browser User-Agent to help bypass blocks
            # Saving to the scraped_data folder
            wget -q -nc -U "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "http://web.archive.org/save/$url" -P ./scraped_data/ || echo "Failed: $url"
            
            # 3 second delay between files for safety
            sleep 3
          done < filtered_urls.txt

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add scraped_data/
          git commit -m "Automated batch download of IGC data [skip ci]" || echo "No changes to commit"
          git push
