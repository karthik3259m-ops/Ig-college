name: Organized Batch Scraper (Archive Fix)
on: [workflow_dispatch]

jobs:
  archive-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch, Filter, and Archive Scrape
        run: |
          # 1. Create directory structure
          mkdir -p Faculty Syllabus Timetables Events Images Archives Others
          
          # 2. Get list of files from Wayback CDX API
          # We use "original" to get the base URL, then we will modify it to download from Archive
          curl -s "https://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=original" \
          | grep -E "\.(jpg|jpeg|png|gif|pdf|docx|doc|xls|xlsx|rar|zip|7z)$" \
          | sort -u > all_links.txt
          
          count=0
          while read -r original_url; do
            # Fix double slashes and convert to lowercase for sorting
            clean_url=$(echo "$original_url" | sed 's|//|/|g' | sed 's|https:/|https://|g')
            lower_url=$(echo "$clean_url" | tr '[:upper:]' '[:lower:]')
            
            # 3. Construct the Wayback Direct Download URL
            # Using 'id_' tells Wayback to serve the raw file without the toolbar
            wayback_download_url="https://web.archive.org/web/2026id_/$clean_url"

            # 4. Sorting Logic
            if [[ "$lower_url" == *"dr-"* || "$lower_url" == *"resume"* || "$lower_url" == *"profile"* ]]; then
              folder="Faculty"
            elif [[ "$lower_url" == *"syllabus"* ]]; then
              folder="Syllabus"
            elif [[ "$lower_url" == *"time-table"* || "$lower_url" == *"timetable"* ]]; then
              folder="Timetables"
            elif [[ "$lower_url" == *"event"* || "$lower_url" == *"invitation"* || "$lower_url" == *"circular"* ]]; then
              folder="Events"
            elif [[ "$lower_url" =~ \.(jpg|jpeg|png|gif)$ ]]; then
              folder="Images"
            elif [[ "$lower_url" =~ \.(rar|zip|7z)$ ]]; then
              folder="Archives"
            else
              folder="Others"
            fi

            # 5. Download with custom filename to avoid 404/naming conflicts
            filename=$(basename "$clean_url")
            
            echo "Downloading: $filename from Archive..."
            wget -nv -nc -O "$folder/$filename" "$wayback_download_url" --no-check-certificate || continue
            
            # 6. Size Check (90MB Limit)
            if [ -f "$folder/$filename" ]; then
              filesize=$(stat -c%s "$folder/$filename")
              if [ $filesize -gt 94371840 ]; then
                echo "Skipping $filename - Too large!"
                rm "$folder/$filename"
                continue
              fi
            fi

            count=$((count + 1))
            
            # 7. Batch Commits (every 50 files)
            if [ $((count % 50)) -eq 0 ]; then
              echo "Pushing batch of $count files..."
              git config user.name "Wayback Bot"
              git config user.email "actions@github.com"
              git add .
              git commit -m "Batch upload: $count files" || true
              git push origin main || (git pull --rebase origin main && git push origin main)
            fi
          done < all_links.txt

          # Final Sync
          git config user.name "Wayback Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Final cleanup and upload" || true
          git push origin main
