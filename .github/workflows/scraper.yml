name: Organized Batch Scraper (Size Limit)
on: [workflow_dispatch]

jobs:
  archive-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch, Filter Size, and Batch Push
        run: |
          # Create organized directory structure
          mkdir -p Faculty Syllabus Timetables Events Images Archives Others
          
          # Fetching links for common document, image, and archive formats
          # Target Site: igceng.com
          curl -s "https://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=original" \
          | grep -E "\.(jpg|jpeg|png|gif|pdf|docx|doc|xls|xlsx|rar|zip|7z)$" \
          | sort -u > all_links.txt
          
          count=0
          while read -r url; do
            lower_url=$(echo "$url" | tr '[:upper:]' '[:lower:]')
            
            # Logic for folder sorting
            if [[ "$lower_url" == *"dr-"* || "$lower_url" == *"resume"* || "$lower_url" == *"profile"* ]]; then
              folder="Faculty"
            elif [[ "$lower_url" == *"syllabus"* ]]; then
              folder="Syllabus"
            elif [[ "$lower_url" == *"time-table"* || "$lower_url" == *"timetable"* ]]; then
              folder="Timetables"
            elif [[ "$lower_url" == *"event"* || "$lower_url" == *"invitation"* || "$lower_url" == *"circular"* ]]; then
              folder="Events"
            elif [[ "$lower_url" =~ \.(jpg|jpeg|png|gif)$ ]]; then
              folder="Images"
            elif [[ "$lower_url" =~ \.(rar|zip|7z)$ ]]; then
              folder="Archives"
            else
              folder="Others"
            fi

            # Download the file (ignoring certificate errors for older archives)
            wget -nv -nc -P "$folder/" "$url" --no-check-certificate || continue
            
            # --- SIZE CHECK ---
            filename=$(basename "$url")
            # Ensure the file exists before checking size
            if [ -f "$folder/$filename" ]; then
              filesize=$(stat -c%s "$folder/$filename")
              
              # GitHub soft limit is 100MB. Setting limit to 90MB for safety margin.
              if [ $filesize -gt 94371840 ]; then
                echo "Skipping $filename ($filesize bytes) - Too large for GitHub!"
                rm "$folder/$filename"
                continue
              fi
            fi

            count=$((count + 1))
            
            # Batching commits every 50 files to prevent timeout/push errors
            if [ $((count % 50)) -eq 0 ]; then
              echo "Pushing batch of $count files..."
              git config user.name "Wayback Bot"
              git config user.email "actions@github.com"
              git add .
              git commit -m "Batch upload: $count files" || true
              git push origin main || (git pull --rebase origin main && git push origin main)
            fi
          done < all_links.txt

          # Final push for remaining files
          git config user.name "Wayback Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Final batch upload" || true
          git push origin main

