name: Organized Batch Scraper (Archive Fix)
on: [workflow_dispatch]

jobs:
  archive-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch, Filter, and Archive Scrape
        run: |
          # 1. Setup Base Directories
          mkdir -p Faculty Syllabus Timetables Events Images Archives Others
          
          # 2. Get list of files WITH TIMESTAMPS
          curl -s "https://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=timestamp,original" \
          | grep -E "\.(jpg|jpeg|png|gif|pdf|docx|doc|xls|xlsx|rar|zip|7z)$" \
          | sort -u > all_data.txt

          if [ ! -s all_data.txt ]; then
            echo "No data found!"
            exit 1
          fi
          
          count=0
          while read -r timestamp original_url; do
            year=$(echo "$timestamp" | cut -c 1-4)
            month=$(echo "$timestamp" | cut -c 5-6)
            
            clean_url=$(echo "$original_url" | sed 's|:80||g')
            lower_url=$(echo "$clean_url" | tr '[:upper:]' '[:lower:]')
            
            # Construct direct download URL
            wayback_download_url="https://web.archive.org/web/${timestamp}id_/$clean_url"

            # Folder logic
            if [[ "$lower_url" == *"dr-"* || "$lower_url" == *"resume"* || "$lower_url" == *"profile"* ]]; then
              type_folder="Faculty"
            elif [[ "$lower_url" == *"syllabus"* ]]; then
              type_folder="Syllabus"
            elif [[ "$lower_url" == *"time-table"* || "$lower_url" == *"timetable"* ]]; then
              type_folder="Timetables"
            elif [[ "$lower_url" == *"event"* || "$lower_url" == *"invitation"* || "$lower_url" == *"circular"* ]]; then
              type_folder="Events"
            elif [[ "$lower_url" =~ \.(jpg|jpeg|png|gif)$ ]]; then
              type_folder="Images"
            elif [[ "$lower_url" =~ \.(rar|zip|7z)$ ]]; then
              type_folder="Archives"
            else
              type_folder="Others"
            fi

            target_dir="$type_folder/$year-$month"
            mkdir -p "$target_dir"
            filename=$(basename "$clean_url" | cut -d? -f1)
            
            # --- 3. RESPECTFUL SLEEP ---
            # Increased to 10 seconds to prevent "Connection Refused"
            echo "Waiting 10 seconds..."
            sleep 10
            
            # --- 4. ENHANCED DOWNLOAD ---
            echo "Downloading: $target_dir/$filename"
            
            # Using --content-disposition and strict timeouts
            if wget -nv -nc --content-disposition -O "$target_dir/$filename" "$wayback_download_url" \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --no-check-certificate --tries=5 --waitretry=10 --timeout=30; then

                # --- 5. STRICT VERIFICATION ---
                if [ -f "$target_dir/$filename" ]; then
                  
                  # Delete if file is 0 bytes (Empty)
                  if [ ! -s "$target_dir/$filename" ]; then
                    echo "Empty file detected ($filename). Deleting..."
                    rm "$target_dir/$filename"
                    continue
                  fi

                  # Delete if the "PDF/IMG" is actually just an HTML Error page
                  # We check the first 500 characters for the <html> tag
                  if head -c 500 "$target_dir/$filename" | grep -iq "<html"; then
                    echo "Fake file detected (HTML error page). Deleting $filename..."
                    rm "$target_dir/$filename"
                    continue
                  fi
                  
                  # If it passed checks, count it
                  count=$((count + 1))
                  echo "Successfully saved: $filename"
                fi
            else
                echo "Wget failed for $filename. Cleaning up..."
                [ -f "$target_dir/$filename" ] && rm "$target_dir/$filename"
            fi

            # 6. BATCH UPLOAD: EVERY 30 FILES (Reduced from 50 for safety)
            if [ $count -gt 0 ] && [ $((count % 30)) -eq 0 ]; then
              echo "Reaching batch limit. Pushing $count files..."
              git config user.name "Wayback Bot"
              git config user.email "actions@github.com"
              git add .
              git commit -m "Batch upload: $count files" || true
              git pull --rebase origin main
              git push origin main
            fi
          done < all_data.txt

          # Final Sync
          if [ $count -gt 0 ]; then
            git config user.name "Wayback Bot"
            git config user.email "actions@github.com"
            git add .
            git commit -m "Final sync: $count total files" || true
            git push origin main
          fi
