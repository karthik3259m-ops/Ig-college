name: Organized Batch Scraper (Archive Fix)
on: [workflow_dispatch]

jobs:
  archive-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch, Filter, and Archive Scrape
        run: |
          # 1. Setup Directories
          mkdir -p Faculty Syllabus Timetables Events Images Archives Others
          
          # 2. Get list of files
          curl -s "https://web.archive.org/cdx/search/cdx?url=igceng.com/*&output=text&fl=original" \
          | grep -E "\.(jpg|jpeg|png|gif|pdf|docx|doc|xls|xlsx|rar|zip|7z)$" \
          | sort -u > all_links.txt

          if [ ! -s all_links.txt ]; then
            echo "No links found! Exiting."
            exit 1
          fi
          
          count=0
          while read -r original_url; do
            clean_url=$(echo "$original_url" | sed 's|:80||g')
            lower_url=$(echo "$clean_url" | tr '[:upper:]' '[:lower:]')
            wayback_download_url="https://web.archive.org/web/id_/$clean_url"

            # Folder logic
            if [[ "$lower_url" == *"dr-"* || "$lower_url" == *"resume"* || "$lower_url" == *"profile"* ]]; then
              folder="Faculty"
            elif [[ "$lower_url" == *"syllabus"* ]]; then
              folder="Syllabus"
            elif [[ "$lower_url" == *"time-table"* || "$lower_url" == *"timetable"* ]]; then
              folder="Timetables"
            elif [[ "$lower_url" == *"event"* || "$lower_url" == *"invitation"* || "$lower_url" == *"circular"* ]]; then
              folder="Events"
            elif [[ "$lower_url" =~ \.(jpg|jpeg|png|gif)$ ]]; then
              folder="Images"
            elif [[ "$lower_url" =~ \.(rar|zip|7z)$ ]]; then
              folder="Archives"
            else
              folder="Others"
            fi

            filename=$(basename "$clean_url" | cut -d? -f1)
            echo "Attempting: $filename"
            
            # Rate limit protection (1-2 second delay)
            sleep $(( ( RANDOM % 2 )  + 1 ))
            
            # Download with Browser User-Agent
            wget -nv -nc -O "$folder/$filename" "$wayback_download_url" \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" \
              --no-check-certificate --tries=3 --timeout=20 || continue
            
            # Verify file is not an HTML error
            if [ -f "$folder/$filename" ]; then
              if head -c 100 "$folder/$filename" | grep -iq "<html>"; then
                rm "$folder/$filename"
                continue
              fi

              # Size check (95MB for safety)
              filesize=$(stat -c%s "$folder/$filename")
              if [ $filesize -gt 99614720 ]; then
                rm "$folder/$filename"
                continue
              fi
              
              count=$((count + 1))
            fi

            # 3. BATCH UPLOAD: EVERY 50 FILES
            if [ $count -gt 0 ] && [ $((count % 50)) -eq 0 ]; then
              echo "Reaching 50 files. Pushing batch..."
              git config user.name "Wayback Bot"
              git config user.email "actions@github.com"
              git add .
              git commit -m "Batch upload: $count files" || true
              # Rebase helps prevent push conflicts if the workflow runs long
              git push origin main || (git pull --rebase origin main && git push origin main)
            fi
          done < all_links.txt

          # Final Sync for any remaining files (less than 50)
          if [ $count -gt 0 ]; then
            git config user.name "Wayback Bot"
            git config user.email "actions@github.com"
            git add .
            git commit -m "Final sync: $count total files" || true
            git push origin main
          fi

